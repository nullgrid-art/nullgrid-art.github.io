<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Entropy Protocol</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #stage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #000;
      }
      canvas { display: block; }
      /* Minimal, unobtrusive load/error note. */
      #note {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        letter-spacing: 0.1em;
        color: #555;
        text-transform: uppercase;
      }
      #note.hidden { display: none; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="stage">
      <canvas id="canvas"></canvas>
    </div>
    <div id="note">Entropy Protocol</div>
    <script type="module" src="/render/token.js"></script>
  </body>
</html>
